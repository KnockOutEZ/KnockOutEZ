<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 108" width="880" height="108" font-family="ui-monospace,'SFMono-Regular','Cascadia Mono',Menlo,Consolas,'Liberation Mono',monospace">
<style>
.fade{animation:fade .9s ease both}
@keyframes fade{from{opacity:0}}
.blink{animation:blink 1.1s steps(2,start) infinite}
@keyframes blink{50%{opacity:0}}
.ping{transform-box:fill-box;transform-origin:center;animation:ping 2.2s ease-out infinite}
@keyframes ping{0%{transform:scale(.55);opacity:.8}100%{transform:scale(1.7);opacity:0}}
.draw{stroke-dasharray:700;animation:draw 2.4s ease both .3s}
@keyframes draw{from{stroke-dashoffset:700}to{stroke-dashoffset:0}}
.grow{transform-box:fill-box;transform-origin:left;animation:grow 1.4s ease both .4s}
@keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
</style>
<line x1="10" y1="12" x2="870" y2="12" stroke="#d0d7de" stroke-width="1"/>
<text x="30" y="56" font-size="14" fill="#0d1117" font-weight="600" text-anchor="start">status: shipping wigolo — public beta</text>
<rect class="blink" x="351" y="43" width="8" height="15" fill="#0d1117"/>
<text x="30" y="84" font-size="11" fill="#57606a" font-weight="400" text-anchor="start">dhaka, bangladesh · utc+6 · open to interesting problems</text>
<text x="850" y="56" font-size="11" fill="#57606a" font-weight="400" text-anchor="end">knockoutez / 2026</text>
</svg>
