<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 170" width="880" height="170" font-family="ui-monospace,'SFMono-Regular','Cascadia Mono',Menlo,Consolas,'Liberation Mono',monospace">
<style>
.fade{animation:fade .9s ease both}
@keyframes fade{from{opacity:0}}
.blink{animation:blink 1.1s steps(2,start) infinite}
@keyframes blink{50%{opacity:0}}
.ping{transform-box:fill-box;transform-origin:center;animation:ping 2.2s ease-out infinite}
@keyframes ping{0%{transform:scale(.55);opacity:.8}100%{transform:scale(1.7);opacity:0}}
.draw{stroke-dasharray:700;animation:draw 2.4s ease both .3s}
@keyframes draw{from{stroke-dashoffset:700}to{stroke-dashoffset:0}}
.grow{transform-box:fill-box;transform-origin:left;animation:grow 1.4s ease both .4s}
@keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
</style>
<path d="M14 34 L14 14 L34 14" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
<path d="M866 34 L866 14 L846 14" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
<path d="M14 136 L14 156 L34 156" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
<path d="M866 136 L866 156 L846 156" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
<text x="440" y="92" font-size="42" fill="#0d1117" font-weight="700" text-anchor="middle" letter-spacing="8" class="fade">towhid khan</text>
<text x="440" y="128" font-size="13" fill="#57606a" font-weight="400" text-anchor="middle" letter-spacing="3" class="fade">knockoutez — cloud · devtools · ai — dhaka, bangladesh</text>
</svg>
